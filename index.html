<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surcharge Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #calculator { max-width: 300px; margin: auto; }
        input[type="number"] { width: 100%; padding: 10px; margin-top: 10px; }
        button { width: 100%; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="calculator">
        <h1>Surcharge Calculator</h1>
        <label for="amount">Enter Amount:</label>
        <input type="number" id="amount" placeholder="Amount" />
        <label for="surcharge">Enter Surcharge Percentage:</label>
        <input type="number" id="surcharge" placeholder="Surcharge Percentage" />
        <button id="calculate">Calculate Total</button>
        <h2 id="result"></h2>
    </div>
   
</body>
</html>
